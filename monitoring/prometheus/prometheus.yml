# ==============================================================================
# Prometheus — DeltaOps scrape configuration
# Every target hostname matches the Docker Compose service name on deltaops-net
# ==============================================================================

global:
  scrape_interval:     10s
  evaluation_interval: 10s
  scrape_timeout:      8s
  external_labels:
    cluster: 'deltaops-prod-01'
    replica: 'a'

rule_files:
  - '/etc/prometheus/alerts.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'
      timeout: 5s

scrape_configs:

  # ── FastAPI Backend (/metrics — prometheus_client) ──────────────────────────
  - job_name: 'deltaops-backend'
    metrics_path: '/metrics'
    scrape_interval: 5s
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend-api'
          env: 'production'

  # ── OTel Collector internal metrics (:8889 prometheus exporter) ─────────────
  - job_name: 'otel-collector'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: 'opentelemetry-collector'

  # ── Node Exporter — host OS metrics ─────────────────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'host-infrastructure'

  # ── cAdvisor — container resource metrics ───────────────────────────────────
  - job_name: 'cadvisor'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'container-metrics'

  # ── Prometheus self-scrape ───────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Alertmanager ─────────────────────────────────────────────────────────────
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
