# ==============================================================================
# DeltaOps Observability Platform — Docker Compose
# Production-grade multi-container stack with full healthchecks
# ==============================================================================

networks:
  deltaops-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  redis_data:

services:

  # ────────────────────────────────────────────────────────────────────────────
  # 1. FASTAPI BACKEND
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: deltaops-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=${APP_NAME:-DeltaOps Engine}
      - APP_ENV=${APP_ENV:-production}
      - APP_VERSION=${APP_VERSION:-0.1.0-alpha}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=${WORKERS:-4}
      - DELTA_BASE_URL=${DELTA_BASE_URL:-https://api.demo.delta.exchange}
      - DELTA_WS_URL=${DELTA_WS_URL:-wss://socket.demo.delta.exchange}
      - DELTA_API_KEY=${DELTA_API_KEY:-}
      - DELTA_API_SECRET=${DELTA_API_SECRET:-}
      # OTel sends to the collector, NOT directly to Jaeger
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - PROMETHEUS_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100
      - JAEGER_URL=http://jaeger:16686
      - ALERTMANAGER_URL=http://alertmanager:9093
      - GRAFANA_URL=http://grafana:3000
    networks:
      - deltaops-net
    depends_on:
      otel-collector:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ────────────────────────────────────────────────────────────────────────────
  # 2. REACT FRONTEND
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: deltaops-frontend
    restart: unless-stopped
    ports:
      - "5173:8080"
      - "80:8080"
    networks:
      - deltaops-net
    depends_on:
      backend:
        condition: service_healthy

  # ────────────────────────────────────────────────────────────────────────────
  # 3. PROMETHEUS
  # ────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: deltaops-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - deltaops-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ────────────────────────────────────────────────────────────────────────────
  # 4. GRAFANA (auto-provisioned datasources + dashboards)
  # ────────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: deltaops-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Secrets should be overridden via .env — never hardcode in production
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-deltaops_admin_pass}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/etc/grafana/provisioning/dashboards/json:ro
      - grafana_data:/var/lib/grafana
    networks:
      - deltaops-net
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ────────────────────────────────────────────────────────────────────────────
  # 5. LOKI — structured log store
  # ────────────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: deltaops-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - deltaops-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ────────────────────────────────────────────────────────────────────────────
  # 6. PROMTAIL — Docker container log tailer
  # ────────────────────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.4
    container_name: deltaops-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - deltaops-net
    depends_on:
      loki:
        condition: service_healthy

  # ────────────────────────────────────────────────────────────────────────────
  # 7. JAEGER — distributed tracing backend + UI
  #    IMPORTANT: Jaeger does NOT expose port 4317 on the host.
  #    The OTel Collector connects to jaeger:4317 over the internal Docker network.
  # ────────────────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: deltaops-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC model port (legacy collectors)
      # Port 4317 is intentionally NOT published to the host —
      # otel-collector reaches it via deltaops-net as jaeger:4317
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=50000
    networks:
      - deltaops-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ────────────────────────────────────────────────────────────────────────────
  # 8. OPENTELEMETRY COLLECTOR
  #    Receives OTLP from backend on :4317/:4318
  #    Exports traces → jaeger:4317, metrics → prometheus :8889, logs → loki:3100
  # ────────────────────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: deltaops-otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC — backend sends here
      - "4318:4318"   # OTLP HTTP — alternative ingress
      - "8889:8889"   # Prometheus metrics exporter (scraped by prometheus)
      - "13133:13133" # OTel Collector health check endpoint
    volumes:
      - ./monitoring/otel-collector/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    networks:
      - deltaops-net
    depends_on:
      jaeger:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:13133/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ────────────────────────────────────────────────────────────────────────────
  # 9. CADVISOR — container resource metrics
  # ────────────────────────────────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: deltaops-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - deltaops-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ────────────────────────────────────────────────────────────────────────────
  # 10. NODE EXPORTER — host OS metrics
  # ────────────────────────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: deltaops-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - deltaops-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────────────────────────────────────────
  # 11. ALERTMANAGER
  # ────────────────────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: deltaops-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - deltaops-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ────────────────────────────────────────────────────────────────────────────
  # 12. REDIS
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: deltaops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - deltaops-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
