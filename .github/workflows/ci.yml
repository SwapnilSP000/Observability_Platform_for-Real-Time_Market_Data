name: DeltaOps CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-ci:
    name: Backend — Lint, Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Black formatting check
        run: black --check backend tests
      - name: Ruff lint
        run: ruff check backend tests
      - name: isort check
        run: isort --check-only backend tests
      - name: Pytest with coverage
        run: pytest -v --cov=backend/app --cov-report=xml --cov-report=term-missing

  frontend-ci:
    name: Frontend — Typecheck & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit
      - name: Production build
        run: cd frontend && npm run build

  docker-ci:
    name: Docker — Compose Validation & Image Build
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
      - uses: actions/checkout@v7
      - name: Validate docker-compose config
        run: docker compose config
      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t deltaops-backend:ci .
      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t deltaops-frontend:ci .
