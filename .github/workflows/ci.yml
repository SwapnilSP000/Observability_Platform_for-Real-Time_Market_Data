name: DeltaOps Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-ci:
    name: Backend Linting, Typecheck & Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Code Formatting Check (Black)
        run: black --check backend tests

      - name: Linting Check (Ruff)
        run: ruff check backend tests

      - name: Import Order Check (isort)
        run: isort --check-only backend tests

      - name: Execute Pytest Suite
        run: pytest -v --cov=backend/app --cov-report=xml

  frontend-ci:
    name: Frontend Typecheck & Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript Typecheck & Production Build
        run: |
          cd frontend
          npm run build

  docker-ci:
    name: Docker Container & Compose Config Validation
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Docker Compose Configuration
        run: docker compose config

      - name: Build Backend Docker Image
        run: docker build -f docker/Dockerfile.backend -t deltaops-backend:ci .

      - name: Build Frontend Docker Image
        run: docker build -f docker/Dockerfile.frontend -t deltaops-frontend:ci .
